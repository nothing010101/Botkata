<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KataCari — Pencarian Kata KBBI</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0e0c09;
      --surface: #1a1712;
      --border: #2e2a22;
      --accent: #e8c97a;
      --accent2: #c4a14a;
      --text: #f0ead8;
      --text-muted: #7a7060;
      --red: #e07060;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 28px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: rgba(14,12,9,0.95);
      backdrop-filter: blur(12px);
      z-index: 100;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 900;
      letter-spacing: -0.02em;
    }

    .logo span { color: var(--accent); }

    .badge {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 4px 10px;
      border-radius: 100px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .hero {
      padding: 80px 40px 60px;
      max-width: 860px;
      margin: 0 auto;
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.8rem, 6vw, 5rem);
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -0.03em;
      margin-bottom: 16px;
    }

    .hero h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .hero p {
      color: var(--text-muted);
      font-size: 1rem;
      font-weight: 300;
      max-width: 480px;
      line-height: 1.7;
      margin-bottom: 48px;
    }

    /* Search area */
    .search-wrap {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      background: var(--surface);
      transition: border-color 0.2s;
    }

    .search-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(232,201,122,0.08);
    }

    #searchInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      padding: 18px 24px;
      font-family: 'DM Mono', monospace;
      font-size: 1.1rem;
      color: var(--text);
      letter-spacing: 0.04em;
    }

    #searchInput::placeholder { color: var(--text-muted); }

    .mode-toggle {
      display: flex;
      border-left: 1px solid var(--border);
    }

    .mode-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 0 18px;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      transition: all 0.2s;
      border-right: 1px solid var(--border);
    }

    .mode-btn:last-child { border-right: none; }

    .mode-btn.active {
      background: var(--accent);
      color: var(--bg);
      font-weight: 500;
    }

    .mode-btn:not(.active):hover { color: var(--text); background: rgba(255,255,255,0.04); }

    #searchBtn {
      background: var(--accent);
      color: var(--bg);
      border: none;
      padding: 0 28px;
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: background 0.2s;
    }

    #searchBtn:hover { background: #f0d98a; }

    /* Quick letters */
    .quick-letters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 20px;
    }

    .letter-btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 6px 12px;
      border-radius: 3px;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.05em;
    }

    .letter-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Results */
    #results {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 40px 80px;
    }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .results-count {
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .results-count strong { color: var(--accent); }

    .source-tag {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-muted);
      border: 1px solid var(--border);
      padding: 3px 10px;
      border-radius: 100px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* Word cards grid */
    .words-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
    }

    .word-card {
      background: var(--bg);
      padding: 20px 24px;
      cursor: pointer;
      transition: background 0.15s;
      position: relative;
    }

    .word-card:hover { background: var(--surface); }

    .word-card .word-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 4px;
      color: var(--text);
    }

    .word-card .word-type {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .word-card .word-def {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 8px;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Detail modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.show { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      max-width: 600px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      border-radius: 4px;
    }

    .modal-header {
      padding: 28px 32px 24px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--surface);
    }

    .modal-word {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: -0.02em;
    }

    .modal-word span { color: var(--accent); }

    .modal-close {
      float: right;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 32px;
      height: 32px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 1rem;
      margin-top: 4px;
      transition: all 0.15s;
    }

    .modal-close:hover { color: var(--text); border-color: var(--text-muted); }

    .modal-body { padding: 28px 32px; }

    .def-item {
      margin-bottom: 20px;
      padding-left: 16px;
      border-left: 2px solid var(--border);
    }

    .def-item.active { border-left-color: var(--accent); }

    .def-num {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 6px;
    }

    .def-kelas {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--accent);
      margin-bottom: 8px;
      display: inline-block;
      background: rgba(232,201,122,0.1);
      padding: 2px 8px;
      border-radius: 3px;
    }

    .def-text {
      font-size: 0.95rem;
      line-height: 1.7;
      color: var(--text);
    }

    .def-example {
      margin-top: 8px;
      font-size: 0.85rem;
      color: var(--text-muted);
      font-style: italic;
    }

    .def-example::before { content: '↳ '; color: var(--accent); font-style: normal; }

    /* State messages */
    .state-msg {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }

    .state-msg .icon {
      font-size: 3rem;
      margin-bottom: 16px;
      display: block;
    }

    .state-msg h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: var(--text);
      margin-bottom: 8px;
    }

    .state-msg p { font-size: 0.9rem; line-height: 1.6; max-width: 360px; margin: 0 auto; }

    /* Loading */
    .loading {
      display: flex;
      gap: 6px;
      justify-content: center;
      padding: 60px 0;
    }

    .loading span {
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 1s ease-in-out infinite;
    }

    .loading span:nth-child(2) { animation-delay: 0.15s; }
    .loading span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes pulse {
      0%, 100% { transform: scale(0.6); opacity: 0.3; }
      50% { transform: scale(1); opacity: 1; }
    }

    /* Pagination */
    .pagination {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 32px;
      flex-wrap: wrap;
    }

    .page-btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 8px 14px;
      cursor: pointer;
      border-radius: 3px;
      transition: all 0.15s;
    }

    .page-btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }
    .page-btn:not(.active):hover { border-color: var(--accent); color: var(--accent); }

    .modal-source {
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .modal-source a {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: 0.04em;
    }

    .modal-source a:hover { text-decoration: underline; }

    .modal-source span { color: var(--text-muted); font-size: 0.7rem; font-family: 'DM Mono', monospace; }

    @media (max-width: 640px) {
      header { padding: 20px 20px; }
      .hero { padding: 48px 20px 40px; }
      #results { padding: 0 20px 60px; }
      .words-grid { grid-template-columns: 1fr 1fr; }
      .modal-body { padding: 20px; }
      .modal-header { padding: 20px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Kata<span>Cari</span></div>
  <div class="badge">KBBI Online</div>
</header>

<div class="hero">
  <h1>Temukan <em>setiap kata</em><br>dalam bahasa Indonesia</h1>
  <p>Cari kata berdasarkan awalan huruf atau kata kunci. Data diambil langsung dari API KBBI secara real-time.</p>

  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="ketik awalan kata... misal: ber" maxlength="50" />
    <div class="mode-toggle">
      <button class="mode-btn active" data-mode="prefix" title="Cari berdasarkan awalan">Awalan</button>
      <button class="mode-btn" data-mode="search" title="Cari kata spesifik">Kata</button>
    </div>
    <button id="searchBtn">Cari</button>
  </div>

  <div class="quick-letters">
    <span style="font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--text-muted);padding:6px 0;letter-spacing:0.1em;text-transform:uppercase;">Cepat →</span>
    <button class="letter-btn" onclick="quickSearch('a')">A</button>
    <button class="letter-btn" onclick="quickSearch('b')">B</button>
    <button class="letter-btn" onclick="quickSearch('c')">C</button>
    <button class="letter-btn" onclick="quickSearch('d')">D</button>
    <button class="letter-btn" onclick="quickSearch('e')">E</button>
    <button class="letter-btn" onclick="quickSearch('m')">M</button>
    <button class="letter-btn" onclick="quickSearch('p')">P</button>
    <button class="letter-btn" onclick="quickSearch('s')">S</button>
    <button class="letter-btn" onclick="quickSearch('t')">T</button>
    <button class="letter-btn" onclick="quickSearch('ber')">ber-</button>
    <button class="letter-btn" onclick="quickSearch('me')">me-</button>
    <button class="letter-btn" onclick="quickSearch('ke')">ke-</button>
  </div>
</div>

<div id="results">
  <div class="state-msg">
    <span class="icon">📖</span>
    <h3>Mulai mencari</h3>
    <p>Ketik awalan huruf atau kata di atas, lalu tekan Cari atau Enter untuk melihat hasilnya.</p>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <button class="modal-close" onclick="closeModalBtn()">✕</button>
      <div class="modal-word" id="modalWord">—</div>
    </div>
    <div class="modal-body" id="modalBody">
    </div>
  </div>
</div>

<script>
let currentMode = 'prefix';
let currentPage = 1;
let allWords = [];
const ITEMS_PER_PAGE = 48;

// Mode toggle
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMode = btn.dataset.mode;
    const ph = currentMode === 'prefix' ? 'ketik awalan kata... misal: ber' : 'ketik kata yang ingin dicari...';
    document.getElementById('searchInput').placeholder = ph;
  });
});

document.getElementById('searchBtn').addEventListener('click', doSearch);
document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

function quickSearch(letter) {
  document.getElementById('searchInput').value = letter;
  currentMode = 'prefix';
  document.querySelectorAll('.mode-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === 'prefix');
  });
  doSearch();
}

async function doSearch() {
  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  if (!query) return;
  currentPage = 1;
  showLoading();

  try {
    if (currentMode === 'prefix') {
      await searchByPrefix(query);
    } else {
      await searchByWord(query);
    }
  } catch (err) {
    showError(err.message);
  }
}

async function searchByPrefix(prefix) {
  // Uses KBBI API via dicariin.com or fallback to kbbi.web.id scrape via allorigins
  // We'll use the free public KBBI API endpoint
  const url = `https://api.dicariin.com/kbbi/${encodeURIComponent(prefix)}`;
  
  let words = [];
  
  try {
    // Try primary API
    const res = await fetch(`https://kbbi.kemdikbud.go.id/Cari/Hasil?l=1&q=${encodeURIComponent(prefix)}`, {
      headers: { 'Accept': 'application/json' }
    });
    // This might get blocked by CORS, so we use allorigins proxy
    throw new Error('need proxy');
  } catch {
    // Use allorigins as CORS proxy to kbbi.kemdikbud.go.id
    try {
      const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent('https://kbbi.kemdikbud.go.id/Cari/Hasil?l=1&q=' + encodeURIComponent(prefix))}`;
      const res = await fetch(proxyUrl);
      const data = await res.json();
      words = parseKBBISearch(data.contents, prefix);
    } catch {
      // Final fallback: use kbbi-api by kbbi.kemdikbud
      words = await fetchFromKBBICloud(prefix, 'prefix');
    }
  }

  allWords = words;
  renderResults(words, prefix, 'prefix');
}

async function fetchFromKBBICloud(query, mode) {
  // Use a reliable public API: https://kbbi.vercel.app
  const words = [];
  
  if (mode === 'prefix') {
    // Fetch letter index from KBBI via allorigins
    const url = `https://kbbi.vercel.app/api/search?q=${encodeURIComponent(query)}`;
    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error();
      const data = await res.json();
      return data.results || data || [];
    } catch {}

    // Another fallback API
    const res2 = await fetch(`https://api.jsonbin.io/v3/qs/kbbi?query=${encodeURIComponent(query)}`).catch(() => null);
    
    // Use KBBI search via allorigins proxy
    const searchUrl = `https://kbbi.kemdikbud.go.id/Cari/Hasil?l=1&q=${encodeURIComponent(query)}`;
    const proxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(searchUrl)}`;
    
    const res3 = await fetch(proxy);
    const html = await res3.text();
    return parseKBBIHTML(html, query);
  } else {
    const searchUrl = `https://kbbi.kemdikbud.go.id/entri/${encodeURIComponent(query)}`;
    const proxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(searchUrl)}`;
    const res = await fetch(proxy);
    const html = await res.text();
    return [parseKBBIEntry(html, query)].filter(Boolean);
  }
}

function parseKBBIHTML(html, query) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  const words = [];
  
  // KBBI result page has <li> with word links or h2 entries
  const items = doc.querySelectorAll('.ol-kbbi li a, #d1 h2, .entri h2');
  items.forEach(el => {
    const text = el.textContent.trim().toLowerCase().replace(/[^a-z\s-]/g, '').trim();
    if (text && text.startsWith(query)) {
      words.push({ word: text, definitions: [], source: 'KBBI Kemendikbud' });
    }
  });
  
  // Also try searching for all links that match
  if (words.length === 0) {
    const links = doc.querySelectorAll('a[href*="/entri/"]');
    links.forEach(a => {
      const text = a.textContent.trim().toLowerCase();
      if (text && text.startsWith(query) && !words.find(w => w.word === text)) {
        words.push({ word: text, definitions: [], source: 'KBBI Kemendikbud' });
      }
    });
  }

  // Parse inline entries too
  const entries = doc.querySelectorAll('.entri');
  entries.forEach(e => {
    const h2 = e.querySelector('h2');
    if (!h2) return;
    const wordText = h2.textContent.trim().split(' ')[0].toLowerCase().replace(/\d/g,'');
    const defs = [];
    e.querySelectorAll('li').forEach((li, i) => {
      defs.push({ num: i+1, text: li.textContent.trim() });
    });
    if (!words.find(w => w.word === wordText)) {
      words.push({ word: wordText, definitions: defs, source: 'KBBI Kemendikbud' });
    }
  });

  return words;
}

function parseKBBISearch(html, query) {
  return parseKBBIHTML(html, query);
}

function parseKBBIEntry(html, word) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  const defs = [];
  doc.querySelectorAll('li').forEach((li, i) => {
    const text = li.textContent.trim();
    if (text.length > 3) defs.push({ num: i+1, text });
  });
  if (defs.length === 0) return null;
  return { word, definitions: defs, source: 'KBBI Kemendikbud' };
}

async function searchByWord(query) {
  try {
    const words = await fetchFromKBBICloud(query, 'word');
    allWords = words;
    renderResults(words, query, 'word');
  } catch (err) {
    showError('Gagal mengambil data. ' + err.message);
  }
}

function renderResults(words, query, mode) {
  const el = document.getElementById('results');
  
  if (!words || words.length === 0) {
    el.innerHTML = `
      <div class="state-msg">
        <span class="icon">🔍</span>
        <h3>Kata tidak ditemukan</h3>
        <p>Tidak ada kata dengan awalan "<strong>${query}</strong>" yang ditemukan di KBBI. Coba kata lain.</p>
      </div>`;
    return;
  }

  const total = words.length;
  const start = (currentPage - 1) * ITEMS_PER_PAGE;
  const slice = words.slice(start, start + ITEMS_PER_PAGE);
  const totalPages = Math.ceil(total / ITEMS_PER_PAGE);

  let html = `
    <div class="results-header">
      <div class="results-count"><strong>${total.toLocaleString('id')}</strong> kata ditemukan untuk "${query}"</div>
      <div class="source-tag">sumber: KBBI Kemendikbud</div>
    </div>
    <div class="words-grid">
  `;

  slice.forEach((w, i) => {
    const wordStr = typeof w === 'string' ? w : (w.word || w.lema || w.judul || '');
    const defArr = w.definitions || w.arti || [];
    const firstDef = defArr[0] ? (defArr[0].text || defArr[0].deskripsi || defArr[0]) : '';
    const kelas = w.kelas || '';
    
    html += `
      <div class="word-card" onclick="openWord('${encodeURIComponent(wordStr)}', ${i + start})">
        <div class="word-text">${wordStr}</div>
        ${kelas ? `<div class="word-type">${kelas}</div>` : ''}
        ${firstDef ? `<div class="word-def">${firstDef}</div>` : '<div class="word-def" style="color:var(--text-muted);font-style:italic">klik untuk lihat definisi</div>'}
      </div>
    `;
  });

  html += `</div>`;

  if (totalPages > 1) {
    html += `<div class="pagination">`;
    const startPage = Math.max(1, currentPage - 3);
    const endPage = Math.min(totalPages, currentPage + 3);
    if (startPage > 1) html += `<button class="page-btn" onclick="goPage(1)">1</button>${startPage > 2 ? '<span style="color:var(--text-muted);padding:8px 4px;font-family:DM Mono,monospace;font-size:0.75rem;">…</span>' : ''}`;
    for (let p = startPage; p <= endPage; p++) {
      html += `<button class="page-btn ${p === currentPage ? 'active' : ''}" onclick="goPage(${p})">${p}</button>`;
    }
    if (endPage < totalPages) html += `${endPage < totalPages-1 ? '<span style="color:var(--text-muted);padding:8px 4px;font-family:DM Mono,monospace;font-size:0.75rem;">…</span>' : ''}<button class="page-btn" onclick="goPage(${totalPages})">${totalPages}</button>`;
    html += `</div>`;
  }

  el.innerHTML = html;
}

function goPage(p) {
  currentPage = p;
  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  renderResults(allWords, query, currentMode);
  document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

async function openWord(encodedWord, idx) {
  const word = decodeURIComponent(encodedWord);
  const cached = allWords[idx];
  
  document.getElementById('modalWord').innerHTML = word;
  document.getElementById('modalBody').innerHTML = '<div class="loading"><span></span><span></span><span></span></div>';
  document.getElementById('modalOverlay').classList.add('show');

  try {
    // Fetch full entry from KBBI
    const searchUrl = `https://kbbi.kemdikbud.go.id/entri/${encodeURIComponent(word)}`;
    const proxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(searchUrl)}`;
    const res = await fetch(proxy);
    const html = await res.text();
    renderModal(html, word, searchUrl);
  } catch {
    // Fallback to cached
    renderModalCached(cached, word);
  }
}

function renderModal(html, word, sourceUrl) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  
  let bodyHtml = '';
  const entries = doc.querySelectorAll('.entri');
  
  if (entries.length > 0) {
    entries.forEach((entry, ei) => {
      const h2 = entry.querySelector('h2');
      const entryWord = h2 ? h2.textContent.trim() : '';
      
      if (ei > 0 && entryWord) {
        bodyHtml += `<div style="margin:24px 0 16px;padding-top:16px;border-top:1px solid var(--border);font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--text-muted)">${entryWord}</div>`;
      }

      const items = entry.querySelectorAll('li');
      items.forEach((li, i) => {
        const text = li.textContent.trim();
        if (!text || text.length < 3) return;
        
        // Check if has class tags
        const kelas = li.querySelector('.kelas, .kata-kelas');
        const kelasText = kelas ? kelas.textContent.trim() : '';
        const contoh = li.querySelector('.contoh');
        const contohText = contoh ? contoh.textContent.trim() : '';
        const defText = text.replace(kelasText, '').replace(contohText, '').trim();

        bodyHtml += `
          <div class="def-item ${i === 0 ? 'active' : ''}">
            <div class="def-num">Definisi ${i + 1}</div>
            ${kelasText ? `<span class="def-kelas">${kelasText}</span>` : ''}
            <div class="def-text">${defText || text}</div>
            ${contohText ? `<div class="def-example">${contohText}</div>` : ''}
          </div>`;
      });
    });
  } else {
    // Try generic li
    const allLi = doc.querySelectorAll('li');
    let count = 0;
    allLi.forEach(li => {
      const text = li.textContent.trim();
      if (text && text.length > 5 && count < 10) {
        bodyHtml += `<div class="def-item ${count === 0 ? 'active' : ''}"><div class="def-num">Definisi ${count + 1}</div><div class="def-text">${text}</div></div>`;
        count++;
      }
    });
    if (count === 0) bodyHtml = `<p style="color:var(--text-muted);font-size:0.9rem">Definisi tidak tersedia. Silakan lihat langsung di sumber.</p>`;
  }

  bodyHtml += `
    <div class="modal-source">
      <span>Sumber →</span>
      <a href="${sourceUrl}" target="_blank" rel="noopener">kbbi.kemdikbud.go.id/entri/${encodeURIComponent(word)}</a>
    </div>`;

  document.getElementById('modalBody').innerHTML = bodyHtml;
}

function renderModalCached(data, word) {
  let bodyHtml = '';
  const defs = data?.definitions || data?.arti || [];
  
  if (defs.length > 0) {
    defs.forEach((d, i) => {
      const text = d.text || d.deskripsi || d;
      bodyHtml += `<div class="def-item ${i===0?'active':''}"><div class="def-num">Definisi ${i+1}</div><div class="def-text">${text}</div></div>`;
    });
  } else {
    bodyHtml = `<p style="color:var(--text-muted);font-size:0.9rem">Definisi tidak tersedia. Lihat di KBBI langsung.</p>`;
  }

  bodyHtml += `
    <div class="modal-source">
      <span>Sumber →</span>
      <a href="https://kbbi.kemdikbud.go.id/entri/${encodeURIComponent(word)}" target="_blank" rel="noopener">kbbi.kemdikbud.go.id</a>
    </div>`;

  document.getElementById('modalBody').innerHTML = bodyHtml;
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalBtn();
}

function closeModalBtn() {
  document.getElementById('modalOverlay').classList.remove('show');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModalBtn();
});

function showLoading() {
  document.getElementById('results').innerHTML = '<div class="loading"><span></span><span></span><span></span></div>';
}

function showError(msg) {
  document.getElementById('results').innerHTML = `
    <div class="state-msg">
      <span class="icon">⚠️</span>
      <h3>Terjadi kesalahan</h3>
      <p>${msg || 'Gagal mengambil data dari KBBI. Coba lagi.'}</p>
    </div>`;
}
</script>
</body>
